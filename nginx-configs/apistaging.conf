server {
    listen 80;
    server_name apistaging.dentispark.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name apistaging.dentispark.com;

    ssl_certificate /etc/letsencrypt/live/apistaging.dentispark.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apistaging.dentispark.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:1000;  # change if your app port differs
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
